<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitMax | Maximize your Fitness</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily:{
                        poppins: ['Poppins','sans-senrif']
                    }
                }
            }
        }
    </script>
</head>
<body>
    <body class="bg-gray-100 font-poppins"></body>
    <div class="min-h-screen">
        <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">

    <!-- Logo -->
    <div class="flex items-center gap-3">
        <div class="bg-green-500 text-white h-12 w-12 rounded-xl flex items-center justify-center">

            <i class="fa-solid fa-dumbbell text-xl"></i>

        </div>

        <div>

            <h1 class="text-2xl font-bold">FitMax</h1>

            <p class="text-sm text-gray-500">Fitness Tracker</p>

        </div>

    </div>

    <!-- Profile -->

    <div class="flex items-center gap-3">
        <img src="https://i.pravatar.cc/150?img=12" class="w-12 h-12 rounded-full border-2 border-green-500">
    </div>

</header>
    <section class="px-6 py-8">

    <p class="text-green-500 font-semibold">Good Morning 👋</p>

    <h2 class="text-4xl font-bold mt-2">Welcome Back!</h2>

    <p class="text-gray-500 mt-3 max-w-lg">Every workout counts. Stay consistent and become stronger than yesterday.</p>

</section>

</div>
    
</body>
</html>
